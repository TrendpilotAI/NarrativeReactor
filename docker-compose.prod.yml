version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: narrative-reactor:latest
    container_name: narrative-reactor
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      # Auth
      API_KEY: ${API_KEY:?API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SCRYPT_SALT: ${SCRYPT_SALT:-narrativereactor_v2_salt}
      # AI Providers
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VERTEX_AI_PROJECT: ${VERTEX_AI_PROJECT:-}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # App
      APP_URL: ${APP_URL:-https://narrativereactor.ai}
      DATABASE_PATH: /app/data/narrative.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - narrative-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - narrative-net

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: narrative-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - narrative-net
    profiles:
      - with-nginx

volumes:
  narrative-data:
    driver: local

networks:
  narrative-net:
    driver: bridge
